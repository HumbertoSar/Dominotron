<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dominotron — suco</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: radial-gradient(circle at 50% 30%, #1a1a2e, #0b0b14);
        color: #e6e6e6;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      h1 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 0.04em;
      }
      .hint {
        margin: 0;
        opacity: 0.6;
        font-size: 0.85rem;
      }
      #suco {
        min-height: 6rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .suco-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .suco-step {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0.4rem 0.7rem;
        border-radius: 0.5rem;
        background: rgba(255, 255, 255, 0.04);
        font-weight: 700;
        opacity: 0;
        transform: translateY(8px) scale(0.8);
        transition: opacity 0.18s ease, transform 0.18s ease;
        /* a intensidade (0..1) cresce o tamanho ao longo do Trace */
        font-size: calc(0.95rem + var(--intensity, 0) * 0.7rem);
      }
      .suco-step.suco-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        animation: pop 0.28s ease;
      }
      .suco-source {
        font-size: 0.65em;
        opacity: 0.7;
        color: #cfcfcf;
      }
      .suco-value {
        font-size: 1em;
      }
      .suco-final {
        font-size: 2.4rem;
        padding: 0.6rem 1.1rem;
        text-shadow: 0 0 16px currentColor;
      }
      .suco-final.suco-visible {
        animation: explode 0.5s ease;
      }
      @keyframes pop {
        0% {
          transform: translateY(0) scale(1.25);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }
      @keyframes explode {
        0% {
          transform: scale(0.6);
        }
        40% {
          transform: scale(1.4) rotate(-2deg);
        }
        100% {
          transform: scale(1) rotate(0);
        }
      }
      button {
        padding: 0.6rem 1.2rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.5rem;
        background: #232336;
        color: #e6e6e6;
        font: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #2d2d48;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
